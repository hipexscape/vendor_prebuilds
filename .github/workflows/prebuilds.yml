name: Prebuild APKs updater

on:
  workflow_dispatch:
    schedule:
    - cron: "0 3 1,15 * *"

jobs:
  update-apps:
    runs-on: ubuntu-latest

    env:
      ACCESS_TOKEN: ${{ secrets.TOKEN }}

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "11"

      - name: Install Git LFS
        run: git lfs install

      - name: Download DotGallery APK
        uses: robinraju/release-downloader@v1.8
        with:
          repository: "IacobIonut01/ReFra"
          latest: true
          fileName: "*NoML-universal-release.apk"
          out-file-path: downloads

      - name: Process and Move DotGallery APK
        run: |
          mkdir -p DotGallery

          APK_FILE=$(find downloads -name "*NoML-universal-release.apk" | head -n1)

          if [ -z "$APK_FILE" ]; then
            echo "Error: No suitable APK found."
            exit 1
          fi

          mv -f "$APK_FILE" DotGallery/DotGallery.apk
          rm -rf downloads

      - name: Download latest release .zip
        uses: robinraju/release-downloader@v1.8
        with:
          repository: "chenxiaolong/BCR"
          latest: true
          fileName: "BCR*.zip"

      - name: Extract BCR*.zip
        run: unzip BCR*.zip -d extracted

      - name: Move app-release.apk to BCR directory
        run: |
          mkdir -p BCR
          mv -f extracted/system/priv-app/com.chiller3.bcr/app-release.apk BCR/

      - name: Rename BCR.apk
        run: |
          mv -f BCR/app-release.apk BCR/BCR.apk

      - name: Clean up
        run: rm -rf BCR*.zip extracted/

      - name: Track APKs using Git LFS
        run: |
          git lfs track "*.apk"
          git add .gitattributes

      - name: Check for Updated Apps
        run: |
          git add .

          CHANGED_FILES=$(git diff --cached --name-only)
          UPDATED_APPS=""

          if echo "$CHANGED_FILES" | grep -q "^DotGallery/"; then
            UPDATED_APPS+="DotGallery, "
          fi

          if echo "$CHANGED_FILES" | grep -q "^BCR/"; then
            UPDATED_APPS+="BCR, "
          fi

          UPDATED_APPS=$(echo "$UPDATED_APPS" | sed 's/, $//')

          if [ -z "$UPDATED_APPS" ]; then
            echo "No apps updated."
            exit 0
          fi

          echo "UPDATED_APPS=$UPDATED_APPS" >> $GITHUB_ENV

      - name: Commit Changes
        run: |
          git config --local user.email "doremon.3181@gmail.com"
          git config --local user.name "ThehipexscapeBot"

          curl -Lo .git/hooks/commit-msg https://raw.githubusercontent.com/hipexscape/Scripts/tsm/commit_id.sh
          chmod +x .git/hooks/commit-msg
          git config --global core.hooksPath .git/hooks

          if ! git diff --cached --quiet; then
            git commit -sm "prebuilds: Incorporate latest $UPDATED_APPS improvements"
          else
            echo "No changes to commit."
          fi

      - name: Push Changes
        uses: ad-m/github-push-action@master
        with:
          github_token: ${{ env.ACCESS_TOKEN }}
